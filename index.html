<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CDC 基本理论模拟测验</title>
<style>
  :root{
    --bg:#f4f2ec; --card:#ffffff; --ink:#1f2a24; --sub:#6b7570;
    --accent:#0f6b4f; --accent-soft:#e3f0ea; --wrong:#b3372f; --wrong-soft:#fbe9e7;
    --right:#177245; --right-soft:#e5f4ea; --line:#e4e1d7; --gold:#c9a24b;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; font-family:-apple-system,"PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif;
       background:var(--bg); color:var(--ink); line-height:1.55;}
  .wrap{max-width:560px; margin:0 auto; padding:16px 14px 60px;}
  header{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:14px;}
  header h1{font-size:17px; margin:0; letter-spacing:.5px;}
  header .tag{font-size:12px; color:var(--sub);}
  .card{background:var(--card); border:1px solid var(--line); border-radius:14px;
        padding:18px 16px; box-shadow:0 1px 3px rgba(40,40,30,.06);}
  /* start screen */
  .hero{text-align:center; padding:34px 18px;}
  .hero .badge{width:64px;height:64px;border-radius:50%;background:var(--accent);color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 14px;font-weight:700;}
  .hero h2{margin:0 0 6px; font-size:21px;}
  .hero p{color:var(--sub); font-size:14px; margin:4px 0;}
  .btn{display:inline-block; border:none; border-radius:12px; padding:13px 26px; font-size:16px;
       background:var(--accent); color:#fff; font-weight:600; cursor:pointer; margin-top:16px;}
  .btn.secondary{background:#fff;color:var(--accent);border:1.5px solid var(--accent);}
  .btn:active{transform:scale(.98);}
  .stats{display:flex; gap:10px; justify-content:center; margin-top:18px; font-size:13px; color:var(--sub);}
  /* progress */
  .prog{display:flex; align-items:center; gap:10px; margin-bottom:12px;}
  .bar{flex:1; height:6px; background:#e7e4da; border-radius:3px; overflow:hidden;}
  .bar i{display:block; height:100%; background:var(--accent); border-radius:3px; transition:width .3s;}
  .prog span{font-size:13px; color:var(--sub); white-space:nowrap;}
  .score-pill{font-size:12px; background:var(--accent-soft); color:var(--accent);
    border-radius:999px; padding:2px 10px; font-weight:600;}
  /* question */
  .qmeta{font-size:12px; color:var(--gold); font-weight:600; letter-spacing:.5px; margin-bottom:6px;}
  .stem{font-size:17px; font-weight:600; margin-bottom:12px;}
  .qimg{display:block; margin:4px auto 14px; max-width:210px; width:60%; border-radius:8px;
        border:1px solid var(--line);}
  .opt{display:flex; align-items:center; gap:10px; width:100%; text-align:left;
       background:#faf9f5; border:1.5px solid var(--line); border-radius:12px;
       padding:13px 14px; font-size:15.5px; margin-bottom:10px; cursor:pointer; color:var(--ink);
       transition:border-color .15s, background .15s; font-family:inherit;}
  .opt .abc{flex:none; width:26px; height:26px; border-radius:50%; background:#eceade;
       display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:var(--sub);}
  .opt img{max-width:130px; border-radius:6px; border:1px solid var(--line);}
  .opt.sel-right{border-color:var(--right); background:var(--right-soft);}
  .opt.sel-right .abc{background:var(--right); color:#fff;}
  .opt.sel-wrong{border-color:var(--wrong); background:var(--wrong-soft);}
  .opt.sel-wrong .abc{background:var(--wrong); color:#fff;}
  .opt.reveal{border-color:var(--right); background:var(--right-soft);}
  .opt:disabled{cursor:default; opacity:1;}
  /* feedback */
  .fb{margin-top:14px; border-radius:12px; padding:14px; font-size:14.5px;}
  .fb.ok{background:var(--right-soft); color:var(--right); font-weight:600;}
  .fb.bad{background:var(--wrong-soft);}
  .fb.bad .t{color:var(--wrong); font-weight:700; margin-bottom:6px;}
  .explain{margin-top:12px; background:#fbf8ef; border:1px solid #eee3c8; border-radius:12px; padding:14px; font-size:14.5px;}
  .explain h4{margin:0 0 6px; font-size:14px; color:var(--gold);}
  .explain .sec{margin-bottom:10px; white-space:pre-wrap;}
  .spin{display:flex; align-items:center; gap:8px; color:var(--sub); font-size:13.5px; margin-top:12px;}
  .spin i{width:16px;height:16px;border:2px solid var(--line);border-top-color:var(--accent);
    border-radius:50%; animation:r 1s linear infinite;}
  @keyframes r{to{transform:rotate(360deg)}}
  .nextrow{margin-top:16px; display:flex; justify-content:flex-end;}
  /* result */
  .result{text-align:center; padding:26px 16px;}
  .big{font-size:44px; font-weight:800; color:var(--accent);}
  .result p{color:var(--sub);}
  .wronglist{text-align:left; margin-top:18px;}
  .wrongitem{border-top:1px solid var(--line); padding:12px 2px; font-size:14px;}
  .wrongitem b{color:var(--wrong);}
  .muted{color:var(--sub); font-size:12.5px; margin-top:10px;}
</style>
</head>

let mode = 'normal';           // 'normal' | 'review' | 'fresh'
let wrongBook = [];            // ["s-n", ...] 错题
let seen = [];                 // ["s-n", ...] 做过的题
let persistOK = false;

const app = document.getElementById('app');
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const imgTag = (k, cls) => `<img class="${cls}" src="data:image/jpeg;base64,${IMGS[k]}" alt="交通标志">`;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ---------- 错题本存取：window.storage → localStorage → 内存 ---------- */
const BOOK_KEY = 'cdc-wrongbook';
let store = 'memory';   // 'cloud' | 'local' | 'memory'

function applyData(raw){
  try{
    const d = JSON.parse(raw);
    if(Array.isArray(d)){ wrongBook = d; seen = d.slice(); }   // 旧格式：只有错题
    else { wrongBook = d.book || []; seen = d.seen || []; }
    wrongBook = wrongBook.filter(k => QIDX[k]);
    seen = seen.filter(k => QIDX[k]);
  }catch(e){}
}
const dump = () => JSON.stringify({v:2, book:wrongBook, seen:seen});

async function loadBook(){
  // 1) Claude 应用内的持久存储
  if(window.storage && window.storage.get){
    store = 'cloud'; persistOK = true;
    try{
      const r = await window.storage.get(BOOK_KEY);
      if(r && r.value) applyData(r.value);
    }catch(e){ /* key 不存在，首次使用 */ }
    return;
  }
  // 2) 浏览器本地存储（把文件下载到电脑/手机后用浏览器打开时可用）
  try{
    const t = '__t'; localStorage.setItem(t,'1'); localStorage.removeItem(t);
    store = 'local'; persistOK = true;
    const v = localStorage.getItem(BOOK_KEY);
    if(v) applyData(v);
  }catch(e){ store = 'memory'; persistOK = false; }
}

async function saveBook(){
  try{
    if(store === 'cloud') await window.storage.set(BOOK_KEY, dump());
    else if(store === 'local') localStorage.setItem(BOOK_KEY, dump());
  }catch(e){}
}

/* ---------- 做题记录 ---------- */
/* ---------- 进度码：把 seen/wrongBook 压缩成短字符串 ---------- */
const KEYS = ALL.map(q => q.s + '-' + q.n);          // 固定顺序的500个题目key
const KEYPOS = {}; KEYS.forEach((k,i) => KEYPOS[k] = i);

function bitsToB64(arr){          // ["s-n",...] -> base64url
  const bytes = new Uint8Array(Math.ceil(KEYS.length/8));
  arr.forEach(k => { const i = KEYPOS[k]; if(i !== undefined) bytes[i>>3] |= 1 << (i&7); });
  let bin=''; bytes.forEach(b => bin += String.fromCharCode(b));
  return btoa(bin).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function b64ToBits(s){            // base64url -> ["s-n",...]
  s = s.replace(/-/g,'+').replace(/_/g,'/');
  while(s.length % 4) s += '=';
  const bin = atob(s);
  const out = [];
  for(let i=0;i<KEYS.length;i++){
    if(bin.charCodeAt(i>>3) & (1 << (i&7))) out.push(KEYS[i]);
  }
  return out;
}
function encodeProgress(){
  return 'C1.' + bitsToB64(seen) + '.' + bitsToB64(wrongBook);
}
function decodeProgress(code){
  const p = code.trim().split('.');
  if(p.length !== 3 || p[0] !== 'C1') throw new Error('进度码格式不对');
  return { seen: b64ToBits(p[1]), book: b64ToBits(p[2]) };
}
function copyCode(){
  const code = encodeProgress();
  const ta = document.getElementById('pcode');
  if(ta){ ta.value = code; ta.select(); ta.setSelectionRange(0, 99999); }
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(code).then(
      ()=>{ const t=document.getElementById('copytip'); if(t) t.textContent='✓ 已复制，粘贴到备忘录或此对话中保存'; },
      ()=>{ const t=document.getElementById('copytip'); if(t) t.textContent='请长按选中文本框内容手动复制'; });
  }else{
    try{ document.execCommand('copy');
      const t=document.getElementById('copytip'); if(t) t.textContent='✓ 已复制';
    }catch(e){ const t=document.getElementById('copytip'); if(t) t.textContent='请长按文本框手动复制'; }
  }
}
function restoreCode(){
  const ta = document.getElementById('rcode');
  if(!ta || !ta.value.trim()){ alert('请先粘贴进度码'); return; }
  try{
    const d = decodeProgress(ta.value);
    d.seen.forEach(k => { if(!seen.includes(k)) seen.push(k); });
    d.book.forEach(k => { if(!wrongBook.includes(k)) wrongBook.push(k); });
    saveBook();
    alert(`恢复成功：已练 ${seen.length} 题，错题 ${wrongBook.length} 题`);
    startScreen();
  }catch(e){ alert('恢复失败：' + e.message); }
}
/* ---------- 从 GitHub Pages 上的 progress.json 自动读取（跨设备同步） ---------- */
let remoteChecked = false, remoteFound = false;
async function syncFromRemote(){
  try{
    const r = await fetch('./progress.json?t=' + Date.now(), {cache:'no-store'});
    remoteChecked = true;
    if(!r.ok) return;
    const d = JSON.parse(await r.text());
    const arrB = Array.isArray(d) ? d : (d.book || []);
    const arrS = Array.isArray(d) ? d : (d.seen || []);
    let changed = false;
    arrB.forEach(k => { if(QIDX[k] && !wrongBook.includes(k)){ wrongBook.push(k); changed = true; } });
    arrS.forEach(k => { if(QIDX[k] && !seen.includes(k)){ seen.push(k); changed = true; } });
    remoteFound = true;
    if(changed) saveBook();
  }catch(e){ remoteChecked = true; /* 未部署到网上、离线、或文件不存在时静默跳过 */ }
}
function downloadProgressFile(){
  const blob = new Blob([JSON.stringify({v:2, book:wrongBook, seen:seen, at:new Date().toISOString()}, null, 1)],
    {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'progress.json';   // 固定文件名，方便直接覆盖仓库里的同名文件
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 3000);
}

function progressPanel(){
  const has = seen.length || wrongBook.length;
  const syncStatus = !remoteChecked ? '尚未检测' : (remoteFound ? '✓ 已连接到 GitHub 上的 progress.json，自动读取中' : '未找到 progress.json（还没上传过，或未部署到 GitHub Pages）');
  return `
  <div style="text-align:left;margin-top:18px;border-top:1px solid var(--line);padding-top:14px">
    <h4 style="font-size:14px;margin:0 0 6px">🔄 与 GitHub 同步（跨设备）</h4>
    <p class="muted" style="margin:0 0 8px">${syncStatus}</p>
    <p class="muted" style="margin:0 0 8px">用法：练完题后点下面按钮下载 progress.json，上传到你的 GitHub 仓库覆盖同名文件；换设备打开网页时会自动读取最新进度。</p>
    ${has ? `<button class="btn secondary" style="margin:0;padding:9px 16px;font-size:14px" onclick="downloadProgressFile()">下载 progress.json</button>`
          : '<p class="muted" style="margin:4px 0">开始做题后这里会出现下载按钮</p>'}
    <p class="muted" style="margin-top:8px">上传地址（把 <b>用户名/仓库名</b> 换成你自己的）：<br>
      <code style="font-size:11.5px;word-break:break-all">github.com/用户名/仓库名/upload/main</code></p>

    <h4 style="font-size:14px;margin:18px 0 6px">💾 进度码（备用，无需联网即可转移）</h4>
    ${has ? `
    <textarea id="pcode" readonly rows="3" onclick="this.select()"
      style="width:100%;font-size:11px;font-family:monospace;border:1px solid var(--line);border-radius:8px;padding:8px;word-break:break-all"
      >${encodeProgress()}</textarea>
    <button class="btn secondary" style="margin:6px 0 0;padding:8px 16px;font-size:14px" onclick="copyCode()">复制进度码</button>
    <span class="muted" id="copytip" style="margin-left:8px"></span>` : ''}
    <h4 style="font-size:14px;margin:14px 0 6px">恢复进度</h4>
    <textarea id="rcode" rows="3" placeholder="把上次保存的进度码粘贴到这里"
      style="width:100%;font-size:11px;font-family:monospace;border:1px solid var(--line);border-radius:8px;padding:8px"></textarea>
    <button class="btn secondary" style="margin:6px 0 0;padding:8px 16px;font-size:14px" onclick="restoreCode()">恢复</button>
  </div>`;
}

function markSeen(q){
  const k = q.s + '-' + q.n;
  if(!seen.includes(k)) seen.push(k);
}
const unseenList = () => ALL.filter(q => !seen.includes(q.s + '-' + q.n));

const storeLabel = () => ({cloud:'已同步保存（Claude 账号）', local:'已保存在本设备浏览器', memory:'仅本次有效'})[store];

/* ---------- 导出 / 导入错题本 ---------- */
function exportBook(){
  const blob = new Blob([JSON.stringify({v:2, book:wrongBook, seen:seen, at:new Date().toISOString()}, null, 1)],
    {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'CDC错题本_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 3000);
}
function importBook(input){
  const f = input.files && input.files[0];
  if(!f) return;
  const fr = new FileReader();
  fr.onload = () => {
    try{
      const d = JSON.parse(fr.result);
      const arrB = Array.isArray(d) ? d : d.book;
      const arrS = Array.isArray(d) ? d : (d.seen || []);
      if(!Array.isArray(arrB)) throw new Error('格式不符');
      const b0 = wrongBook.length, s0 = seen.length;
      arrB.forEach(k => { if(QIDX[k] && !wrongBook.includes(k)) wrongBook.push(k); });
      arrS.forEach(k => { if(QIDX[k] && !seen.includes(k)) seen.push(k); });
      saveBook();
      alert(`导入成功：错题 +${wrongBook.length-b0}（共${wrongBook.length}），做题记录 +${seen.length-s0}（共${seen.length}）`);
      showBook();
    }catch(e){ alert('导入失败：' + e.message); }
  };
  fr.readAsText(f);
}
function bookAdd(q){
  const k = q.s + '-' + q.n;
  if(!wrongBook.includes(k)){ wrongBook.push(k); saveBook(); }
}
function bookRemove(q){
  const k = q.s + '-' + q.n;
  const i = wrongBook.indexOf(k);
  if(i >= 0){ wrongBook.splice(i, 1); saveBook(); }
}

/* ---------- 首页 ---------- */
function startScreen(){
  const bn = wrongBook.length;
  const un = unseenList().length;
  const done = ALL.length - un;
  const pct = Math.round(done / ALL.length * 100);
  app.innerHTML = `
  <div class="card hero">
    <div class="badge">驾</div>
    <h2>基本理论模拟测验</h2>
    <p>每次随机抽取 ${N_PER_QUIZ} 题（含交通标志图题）</p>
    <div style="margin:16px 0 6px">
      <div class="bar"><i style="width:${pct}%"></i></div>
      <div class="muted" style="margin-top:6px">已练 ${done} / ${ALL.length} 题（${pct}%）　·　未做 ${un} 题</div>
    </div>
    <button class="btn" onclick="startQuiz('normal')">开始测验（全题库随机）</button>
    ${un ? `<br><button class="btn secondary" onclick="startQuiz('fresh')">只练没做过的题（${un}题）</button>` : '<p class="muted" style="margin-top:12px">🎉 全部 500 题都练过了</p>'}
    ${bn ? `<br><button class="btn secondary" style="margin-top:10px" onclick="startQuiz('review')">错题重练（${bn}题）</button>` : ''}
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:14px">
      ${bn ? `<button class="btn secondary" style="margin:0;padding:9px 16px;font-size:14px" onclick="showBook()">错题本</button>` : ''}
      <button class="btn secondary" style="margin:0;padding:9px 16px;font-size:14px" onclick="showUnseen()">未做题目</button>
    </div>
    <div class="stats"><span>题库 ${ALL.length} 题</span><span>·</span><span>及格线 ${PASS}/${N_PER_QUIZ}（90%）</span>${bn?`<span>·</span><span>错题 ${bn} 题</span>`:''}</div>
    ${progressPanel()}
  </div>`;
}

/* ---------- 未做题目列表 ---------- */
function showUnseen(){
  const items = unseenList();
  const bySet = {};
  items.forEach(q => { (bySet[q.s] = bySet[q.s] || []).push(q.n); });
  const summary = Object.keys(bySet).sort((a,b)=>a-b).map(s =>
    `<div class="wrongitem" style="padding:9px 2px">
       <b>第${s}套</b>　未做 ${bySet[s].length} 题　<span class="muted">题号：${bySet[s].join(', ')}</span>
     </div>`).join('');
  const list = items.slice(0, 40).map(q => {
    const ci = q.opts.findIndex(o => o[1] === 1);
    const corr = q.io ? '（下图标志）' : esc(q.opts[ci][0]);
    const im = q.img ? imgTag(q.img,'qimg') : (q.io ? imgTag(q.opts[ci][0],'qimg') : '');
    return `<div class="wrongitem">
      <div><b>第${q.s}套第${q.n}题</b>　${esc(q.stem)}</div>${im}
      <div>✅ ${corr}</div></div>`;
  }).join('');
  app.innerHTML = `
  <div class="card">
    <h3 style="margin:0 0 4px">未做过的题（${items.length} 题）</h3>
    <p class="muted" style="margin-top:0">做过一次（无论对错）即算已练</p>
    ${items.length ? `<button class="btn" style="margin-top:4px" onclick="startQuiz('fresh')">直接开练</button>` : '<p class="muted">🎉 全部题目都已练过</p>'}
    ${items.length ? `<h4 style="font-size:14px;margin:20px 0 4px">分套统计</h4><div class="wronglist">${summary}</div>
      <h4 style="font-size:14px;margin:20px 0 4px">题目预览${items.length>40?'（前 40 题）':''}</h4>
      <div class="wronglist">${list}</div>` : ''}
    <div class="nextrow" style="justify-content:space-between">
      <button class="btn secondary" onclick="resetProgress()">重置练习进度</button>
      <button class="btn" onclick="startScreen()">返回</button>
    </div>
  </div>`;
  window.scrollTo(0,0);
}
function resetProgress(){
  if(!confirm('确定清空「已练过」记录吗？（错题本不受影响）')) return;
  seen = []; saveBook(); startScreen();
}

/* ---------- 错题本列表 ---------- */
function showBook(){
  const items = wrongBook.map(k => QIDX[k]).filter(Boolean);
  let list = items.map(q => {
    const ci = q.opts.findIndex(o => o[1] === 1);
    const corr = q.io ? '（下图标志）' : esc(q.opts[ci][0]);
    const im = q.img ? imgTag(q.img, 'qimg') : (q.io ? imgTag(q.opts[ci][0], 'qimg') : '');
    return `<div class="wrongitem">
      <div><b>第${q.s}套第${q.n}题</b>　${esc(q.stem)}</div>${im}
      <div>✅ ${corr}</div>
      <button class="btn secondary" style="padding:6px 14px;font-size:13px;margin-top:8px"
        onclick="removeFromBook('${q.s}-${q.n}')">已掌握，移出</button>
    </div>`;
  }).join('');
  app.innerHTML = `
  <div class="card">
    <h3 style="margin:0 0 4px">错题本（${items.length} 题）</h3>
    <p class="muted" style="margin-top:0">错题重练中答对会自动移出　·　${storeLabel()}</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin:12px 0">
      <button class="btn secondary" style="padding:9px 16px;font-size:14px;margin:0" onclick="exportBook()">⬇︎ 导出备份</button>
      <button class="btn secondary" style="padding:9px 16px;font-size:14px;margin:0"
        onclick="document.getElementById('impf').click()">⬆︎ 导入备份</button>
      <input type="file" id="impf" accept=".json,application/json" style="display:none" onchange="importBook(this)">
    </div>
    <div class="wronglist">${list || '<p class="muted">暂无错题</p>'}</div>
    <div class="nextrow" style="justify-content:space-between">
      <button class="btn secondary" onclick="clearBook()">清空错题本</button>
      <button class="btn" onclick="startScreen()">返回</button>
    </div>
  </div>`;
  window.scrollTo(0,0);
}
function removeFromBook(k){
  const q = QIDX[k]; if(q) bookRemove(q);
  showBook();
}
function clearBook(){
  if(!confirm('确定清空错题本吗？（练习进度不受影响）')) return;
  wrongBook = []; saveBook();
  startScreen();
}

/* ---------- 测验流程 ---------- */
function startQuiz(m){
  mode = m || 'normal';
  let pool;
  if(mode === 'review') pool = wrongBook.map(k => QIDX[k]).filter(Boolean);
  else if(mode === 'fresh') pool = unseenList();
  else pool = [...ALL];
  if(!pool.length){ startScreen(); return; }
  quiz = shuffle([...pool]).slice(0, N_PER_QUIZ);
  idx = 0; score = 0; wrongs = [];
  render();
}

function render(){
  const q = quiz[idx];
  answered = false;
  const letters = ['A','B','C'];
  let optHtml = q.opts.map((o,i)=>{
    const inner = q.io ? imgTag(o[0], '') : esc(o[0]);
    return `<button class="opt" id="opt${i}" onclick="pick(${i})">
      <span class="abc">${letters[i]}</span><span>${inner}</span></button>`;
  }).join('');
  app.innerHTML = `
  <div class="prog">
    <span>${idx+1} / ${quiz.length}</span>
    <div class="bar"><i style="width:${(idx)/quiz.length*100}%"></i></div>
    <span class="score-pill">${mode==='review'?'错题练 · ':(mode==='fresh'?'新题 · ':'')}✓ ${score}</span>
  </div>
  <div class="card">
    <div class="qmeta">第${q.s}套 · 第${q.n}题</div>
    <div class="stem">${esc(q.stem)}</div>
    ${q.img ? imgTag(q.img,'qimg') : ''}
    ${optHtml}
    <div id="fb"></div>
    <div class="nextrow" id="nextrow" style="display:none">
      <button class="btn" onclick="next()" id="nextbtn">下一题</button>
    </div>
  </div>`;
}

function pick(i){
  if(answered) return;
  answered = true;
  const q = quiz[idx];
  const correctIdx = q.opts.findIndex(o=>o[1]===1);
  const right = i === correctIdx;
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  document.getElementById('opt'+correctIdx).classList.add(right?'sel-right':'reveal');
  const fb = document.getElementById('fb');
  markSeen(q);
  if(right){
    score++;
    if(mode === 'review'){
      bookRemove(q);
      fb.innerHTML = `<div class="fb ok">✓ 回答正确，已移出错题本</div>`;
    }else{
      saveBook();
      fb.innerHTML = `<div class="fb ok">✓ 回答正确</div>`;
    }
  } else {
    document.getElementById('opt'+i).classList.add('sel-wrong');
    wrongs.push({q, picked:i, correct:correctIdx});
    bookAdd(q);
    const corrText = q.io ? `选项 ${'ABC'[correctIdx]}（见绿色高亮图）` : `${'ABC'[correctIdx]}. ${esc(q.opts[correctIdx][0])}`;
    fb.innerHTML = `<div class="fb bad"><div class="t">✗ 答错了</div>正确答案：${corrText}<div class="muted">已加入错题本</div></div>`;
  }
  document.getElementById('nextrow').style.display='flex';
  document.querySelector('.bar i').style.width = ((idx+1)/quiz.length*100)+'%';
  if(idx === quiz.length-1) document.getElementById('nextbtn').textContent = '查看结果';
}

function next(){
  if(idx < quiz.length-1){ idx++; render(); }
  else result();
}

function result(){
  const pct = Math.round(score/quiz.length*100);
  const pass = score >= PASS;
  let wrongHtml = '';
  if(wrongs.length){
    wrongHtml = `<div class="wronglist"><h3 style="font-size:15px">本轮错题（${wrongs.length}题，已存入错题本）</h3>` +
      wrongs.map(w=>{
        const q=w.q;
        const corr = q.io ? `选项${'ABC'[w.correct]}` : q.opts[w.correct][0];
        const im = q.img ? imgTag(q.img,'qimg') : (q.io ? imgTag(q.opts[w.correct][0],'qimg') : '');
        return `<div class="wrongitem"><div><b>第${q.s}套第${q.n}题</b>　${esc(q.stem)}</div>${im}
          <div>✅ 正确答案：${q.io?corr+'（下图）':esc(corr)}</div></div>`;
      }).join('') + '</div>';
  }
  const un = unseenList().length;
  const passMsg = mode==='review'
    ? `本轮答对 ${score} 题，剩余错题 ${wrongBook.length} 题`
    : (pass?'🎉 恭喜通过！（'+pct+'%）':'未达及格线 '+PASS+' 题（'+pct+'%），再接再厉');
  app.innerHTML = `
  <div class="card result">
    <div class="big">${score} / ${quiz.length}</div>
    <p>${passMsg}</p>
    <p class="muted">题库进度：已练 ${ALL.length-un} / ${ALL.length} 题　·　未做 ${un} 题</p>
    <button class="btn" onclick="startQuiz('${mode}')">${mode==='fresh'?'继续练新题':(mode==='review'?'继续错题练':'再来 20 题')}</button>
    ${mode!=='fresh' && un?`<br><button class="btn secondary" onclick="startQuiz('fresh')">只练没做过的题（${un}题）</button>`:''}
    ${mode!=='review' && wrongBook.length?`<br><button class="btn secondary" style="margin-top:10px" onclick="startQuiz('review')">错题重练（${wrongBook.length}题）</button>`:''}
    <br><button class="btn secondary" style="margin-top:10px" onclick="startScreen()">返回首页</button>
    ${wrongHtml}
    <div style="text-align:left;margin-top:18px;border-top:1px solid var(--line);padding-top:14px">
      <h4 style="font-size:14px;margin:0 0 6px">🔄 想在其他设备继续？同步一下</h4>
      <button class="btn secondary" style="margin:0;padding:9px 16px;font-size:14px" onclick="downloadProgressFile()">下载 progress.json</button>
      <p class="muted" style="margin:8px 0 0">上传到 GitHub 覆盖同名文件即可，其他设备打开网页会自动读取最新进度。</p>
    </div>
    <p class="muted">真实 BTT 考试为 50 题限时 50 分钟，需答对 45 题（90%）</p>
  </div>`;
  window.scrollTo(0,0);
}

loadBook().then(syncFromRemote).catch(()=>{}).finally(startScreen);
</script>
</body>
</html>
